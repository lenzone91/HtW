datamodule:
  datasets:
    train:
      dataset_type: two_rooms
      device: cpu
      size: 2
      val_size: 2
      batch_size: 1
      sample_length: 4
      n_steps: 8
      img_size: 32
      fix_wall: true
      fix_wall_location: 16
      fix_door_location: 10
    val:
      dataset_type: two_rooms
      device: cpu
      size: 2
      val_size: 2
      batch_size: 1
      sample_length: 4
      n_steps: 8
      img_size: 32
      fix_wall: true
      fix_wall_location: 16
      fix_door_location: 10
    test: null
  collators:
    train:
      collator_type: ac_video_jepa
      transforms: []
    val:
      collator_type: ac_video_jepa
      transforms: []
    test: null
  dataloader_configs:
    train:
      batch_size: 2
      shuffle: false
      num_workers: 0
      drop_last: false
    val:
      batch_size: 2
      shuffle: false
      num_workers: 0
      drop_last: false
    test: null

module:
  module_type: ac_video_jepa
  model_config:
    model_type: ac_video_jepa
    encoder:
      encoder_type: impala
      width: 1
      stack_sizes: [4, 8, 8]
      num_blocks: 2
      dropout_rate: null
      layer_norm: false
      input_channels: 2
      final_ln: true
      mlp_output_dim: 32
      input_shape: [2, 32, 32]
    action_encoder:
      action_encoder_type: identity
    predictor:
      predictor_type: rnn
      hidden_size: 32
      action_dim: 2
      num_layers: 1
      use_encoder_final_ln: true
    projector:
      enabled: false
      mlp_spec: null
      hidden_multiplier: 4
    inverse_dynamics_model:
      enabled: true
      hidden_dim: 16
      action_dim: 2
    regularizer:
      regularizer_type: vc_idm_sim
      cov_coeff: 0.1
      std_coeff: 0.1
      sim_coeff_t: 0.1
      idm_coeff: 0.1
      std_margin: 1.0
      first_t_only: false
      spatial_as_samples: false
      sim_t_after_proj: false
      idm_after_proj: false
    prediction_cost:
      prediction_cost_type: square_loss_seq
      use_projector: false
  unroll_config:
    nsteps: 2
    unroll_mode: autoregressive
    ctxt_window_time: 1
    return_all_steps: false
  optimizer_config:
    optimizer_type: adamw
    lr: 0.001
    betas: [0.9, 0.999]
    eps: 1.0e-8
    weight_decay: 0.01
    amsgrad: false
    maximize: false
    foreach: null
    capturable: false
    differentiable: false
    fused: null
  scheduler_config:
    enabled: false

trainer:
  accelerator: cpu
  devices: 1
  fast_dev_run: true
  enable_checkpointing: true
  enable_model_summary: false

loggers: {}

checkpoints:
  last:
    checkpoint_type: last
    dirpath: null
    filename: last
    every_n_epochs: 1

resume:
  enabled: false
  checkpoint_path: null

loading:
  module:
    enabled: false
    type: lightning_module
    checkpoint_path: null
    strict: true
    map_location: cpu
    state_dict_key: state_dict
    relative_to: run_dir

setup:
  paths:
    run_root: Octave/runs
    experiment_name: ac_video_jepa
    run_name: toy
    overwrite: true
  reproducibility:
    seed: 42
    deterministic: false
    cudnn_benchmark: false
  logger_registration:
    wandb:
      enabled: false
      login: false
      mode: disabled
      api_key_env_var: WANDB_API_KEY
      strict: true

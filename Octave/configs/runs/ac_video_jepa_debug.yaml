datamodule:
  datasets:
    train:
      two_rooms:
        device: cpu
        size: 4
        val_size: 4
        batch_size: 1
        sample_length: 4
        n_steps: 8
        img_size: 32
        fix_wall: true
        fix_wall_location: 16
        fix_door_location: 10
    val:
      two_rooms:
        device: cpu
        size: 4
        val_size: 4
        batch_size: 1
        sample_length: 4
        n_steps: 8
        img_size: 32
        fix_wall: true
        fix_wall_location: 16
        fix_door_location: 10
    test: null
  collators:
    train:
      ac_video_jepa:
        transforms: []
    val:
      ac_video_jepa:
        transforms: []
    test: null
  dataloader_configs:
    train:
      batch_size: 2
      shuffle: false
      num_workers: 0
      drop_last: false
    val:
      batch_size: 2
      shuffle: false
      num_workers: 0
      drop_last: false
    test: null
module:
  module_type: ac_video_jepa
  components_config:
    model_type: ac_video_jepa
    encoder:
      encoder_type: impala
      width: 1
      stack_sizes:
      - 4
      - 8
      - 8
      num_blocks: 2
      dropout_rate: null
      layer_norm: false
      input_channels: 2
      final_ln: true
      mlp_output_dim: 32
      input_shape:
      - 2
      - 32
      - 32
    action_encoder:
      action_encoder_type: identity
    predictor:
      predictor_type: rnn
      hidden_size: 32
      action_dim: 2
      num_layers: 1
      use_encoder_final_ln: true
  rollout_config:
    rollout_type: latent
    nsteps: 2
    unroll_mode: autoregressive
    ctxt_window_time: 1
    return_all_steps: false
  optimizer_config:
    optimizer_type: adamw
    lr: 0.001
    betas:
    - 0.9
    - 0.999
    eps: 1.0e-08
    weight_decay: 0.01
    amsgrad: false
    maximize: false
    foreach: null
    capturable: false
    differentiable: false
    fused: null
  scheduler_config:
    enabled: false
  metric_set_config:
    set_type: ac_video_jepa
    strict: true
    metric_to_input_names: null
    metrics:
      prediction_loss:
        metric_type: autoregressive_prediction_loss
        prediction_cost:
          prediction_cost_type: square_loss_seq
          use_projector: false
      std_loss:
        metric_type: hinge_std
        projector:
          enabled: false
          mlp_spec: null
          hidden_multiplier: 4
        std_margin: 1.0
        first_t_only: false
        spatial_as_samples: false
      cov_loss:
        metric_type: covariance
        projector:
          enabled: false
          mlp_spec: null
          hidden_multiplier: 4
        first_t_only: false
        spatial_as_samples: false
      sim_loss_t:
        metric_type: temporal_similarity
        projector:
          enabled: false
          mlp_spec: null
          hidden_multiplier: 4
        after_projection: false
      idm_loss:
        metric_type: inverse_dynamics
        projector:
          enabled: false
          mlp_spec: null
          hidden_multiplier: 4
        inverse_dynamics_model:
          enabled: true
          hidden_dim: 16
          action_dim: 2
        after_projection: false
  loss_config:
    loss_type: weighted_metric
    name: loss
    strict: true
    return_loss_terms: true
    metric_weights:
      prediction_loss: 1.0
      cov_loss: 0.1
      std_loss: 0.1
      sim_loss_t: 0.1
      idm_loss: 0.1
trainer:
  accelerator: cpu
  devices: 1
  max_steps: 2
  limit_val_batches: 1
  num_sanity_val_steps: 0
  enable_checkpointing: true
  enable_model_summary: false
  log_every_n_steps: 1
loggers:
  csv:
    save_dir: logs
    name: csv
    version: null
    prefix: ''
    flush_logs_every_n_steps: 1
checkpoints:
  last:
    checkpoint_type: last
    dirpath: null
    filename: last
    every_n_epochs: 1
resume:
  enabled: false
  checkpoint_path: null
loading:
  module:
    enabled: false
    type: lightning_module
    checkpoint_path: null
    strict: true
    map_location: cpu
    state_dict_key: state_dict
    relative_to: run_dir
setup:
  paths:
    run_root: Octave/runs
    experiment_name: ac_video_jepa
    run_name: debug
    existing_run_dir_policy: overwrite
  reproducibility:
    seed: 42
    deterministic: false
    cudnn_benchmark: false
  logger_registration:
    wandb:
      enabled: false
      login: false
      mode: disabled
      api_key_env_var: WANDB_API_KEY
      strict: true

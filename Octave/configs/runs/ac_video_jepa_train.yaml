datamodule:
  datasets:
    train:
      two_rooms:
        device: cpu
        size: 10000
        val_size: 10000
        batch_size: 1
        sample_length: 17
        n_steps: 91
        img_size: 64
        fix_wall: true
        fix_wall_location: 32
        fix_door_location: 10
        normalize: true
        cross_wall_rate: 0.1
        expert_cross_wall_rate: 0.0
        wall_bump_rate: 0.0
        dup_traj_rate: 0.0
        num_train_layouts: -1
    val:
      two_rooms:
        device: cpu
        size: 10000
        val_size: 10000
        batch_size: 1
        sample_length: 17
        n_steps: 91
        img_size: 64
        fix_wall: true
        fix_wall_location: 32
        fix_door_location: 10
        normalize: true
        cross_wall_rate: 0.1
        expert_cross_wall_rate: 0.0
        wall_bump_rate: 0.0
        dup_traj_rate: 0.0
        num_train_layouts: -1
    test: null
  collators:
    train:
      ac_video_jepa:
        transforms: []
    val:
      ac_video_jepa:
        transforms: []
    test: null
  dataloader_configs:
    train:
      batch_size: 384
      shuffle: true
      num_workers: 0
      pin_memory: true
      persistent_workers: false
      drop_last: true
    val:
      batch_size: 4
      shuffle: false
      num_workers: 0
      pin_memory: true
      persistent_workers: false
      drop_last: true
    test: null
module:
  module_type: ac_video_jepa
  components_config:
    model_type: ac_video_jepa
    encoder:
      encoder_type: impala
      width: 1
      stack_sizes:
      - 16
      - 32
      - 32
      num_blocks: 2
      dropout_rate: null
      layer_norm: false
      input_channels: 2
      final_ln: true
      mlp_output_dim: 512
      input_shape:
      - 2
      - 64
      - 64
    action_encoder:
      action_encoder_type: identity
    predictor:
      predictor_type: rnn
      hidden_size: 512
      action_dim: 2
      num_layers: 1
      use_encoder_final_ln: true
  rollout_config:
    rollout_type: latent
    nsteps: 8
    unroll_mode: autoregressive
    ctxt_window_time: 1
    return_all_steps: false
  optimizer_config:
    optimizer_type: adamw
    lr: 0.001
    betas:
    - 0.9
    - 0.999
    eps: 1.0e-08
    weight_decay: 1.0e-05
    amsgrad: false
    maximize: false
    foreach: null
    capturable: false
    differentiable: false
    fused: null
  scheduler_config:
    enabled: false
  metric_set_config:
    set_type: ac_video_jepa
    strict: true
    metric_to_input_names: null
    metrics:
      prediction_loss:
        metric_type: autoregressive_prediction_loss
        prediction_cost:
          prediction_cost_type: square_loss_seq
          use_projector: false
      std_loss:
        metric_type: hinge_std
        projector:
          enabled: false
          mlp_spec: null
          hidden_multiplier: 4
        std_margin: 1.0
        first_t_only: false
        spatial_as_samples: false
      cov_loss:
        metric_type: covariance
        projector:
          enabled: false
          mlp_spec: null
          hidden_multiplier: 4
        first_t_only: false
        spatial_as_samples: false
      sim_loss_t:
        metric_type: temporal_similarity
        projector:
          enabled: false
          mlp_spec: null
          hidden_multiplier: 4
        after_projection: false
      idm_loss:
        metric_type: inverse_dynamics
        projector:
          enabled: false
          mlp_spec: null
          hidden_multiplier: 4
        inverse_dynamics_model:
          enabled: true
          hidden_dim: 256
          action_dim: 2
        after_projection: false
  loss_config:
    loss_type: weighted_metric
    name: loss
    strict: true
    return_loss_terms: true
    metric_weights:
      prediction_loss: 1.0
      cov_loss: 8.0
      std_loss: 16.0
      sim_loss_t: 12.0
      idm_loss: 1.0
trainer:
  accelerator: auto
  devices: 1
  max_epochs: 12
  precision: bf16-mixed
  gradient_clip_val: 2.0
  log_every_n_steps: 10
  enable_checkpointing: true
  enable_model_summary: true
loggers:
  wandb:
    project: htw-ac-video-jepa
    name: ac_video_jepa_train
    offline: false
    save_dir: logs
    dir: wandb
    log_model: false
    watch:
      enabled: true
      log: all
      log_freq: 100
      log_graph: true
    metrics:
      enabled: true
      define_metrics: true
      direct_log: true
      step_metric: trainer/global_step
      metric_patterns:
      - train/*
      - val/*
      - test/*
      require_wandb_logger: true
checkpoints:
  last:
    checkpoint_type: last
    dirpath: null
    filename: last
    every_n_epochs: 1
  periodic:
    checkpoint_type: periodic
    dirpath: null
    filename: epoch={epoch}-step={step}
    every_n_epochs: 1
  best_val_loss:
    checkpoint_type: best_value
    dirpath: null
    filename: best-{epoch}-{step}
    monitor: val/loss
    mode: min
    save_top_k: 1
resume:
  enabled: false
  checkpoint_path: null
loading:
  module:
    enabled: false
    type: lightning_module
    checkpoint_path: null
    strict: true
    map_location: cpu
    state_dict_key: state_dict
    relative_to: run_dir
setup:
  paths:
    run_root: Octave/runs
    experiment_name: ac_video_jepa
    run_name: train_impala_rnn
    existing_run_dir_policy: fail
  reproducibility:
    seed: 1
    deterministic: false
    cudnn_benchmark: false
  logger_registration:
    wandb:
      enabled: true
      login: true
      mode: online
      api_key_env_var: WANDB_API_KEY
      strict: true

# @package trainer
# Ten full epochs with end-of-epoch validation (drives val/loss for the
# checkpoints and early-stopping guards). Checkpointing must be enabled.
max_epochs: 10
accelerator: cpu
enable_checkpointing: true
check_val_every_n_epoch: 1
num_sanity_val_steps: 0
log_every_n_steps: 1
enable_progress_bar: false
enable_model_summary: false
gradient_clip_val: 1.0

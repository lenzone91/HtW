# @package setup
device: auto
reproducibility:
  seed: 42
  deterministic: false
  cudnn_benchmark: false
paths:
  project_root: null
  run_root: runs
  experiment_name: ac_video_jepa
  run_name: toy_run_online           # this run's identity / results directory
  existing_run_dir_policy: ask       # re-running asks before deleting prior results
user_credential:
  enabled: true                      # load the W&B key from the gitignored file
  path: user_credential.yaml         # {wandb: {api_key: ...}}
  environment_variables:
    WANDB_API_KEY: [wandb, api_key]
wandb:
  enabled: true                      # ONLINE: export the key + `wandb login` once
  mode: online
  login: true
  api_key_env_var: WANDB_API_KEY

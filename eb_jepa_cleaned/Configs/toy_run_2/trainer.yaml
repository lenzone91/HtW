# @package trainer
# Trains for two full epochs. enable_checkpointing must be on for the checkpoint
# callbacks. Validation runs at the end of every epoch (check_val_every_n_epoch
# defaults to 1), producing the `val/loss` that the best-value checkpoint and the
# finite-value early stopping monitor.
max_epochs: 2
accelerator: cpu
enable_checkpointing: true
check_val_every_n_epoch: 1
num_sanity_val_steps: 0
log_every_n_steps: 1
enable_progress_bar: false
enable_model_summary: false

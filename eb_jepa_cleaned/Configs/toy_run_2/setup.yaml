# @package setup
device: auto
reproducibility:
  seed: 42
  deterministic: false
  cudnn_benchmark: false
paths:
  project_root: null
  run_root: runs
  experiment_name: ac_video_jepa
  run_name: toy_run_2               # this run's identity / results directory
  existing_run_dir_policy: ask      # re-running asks before deleting prior results
user_credential:
  enabled: false                    # set true to load secrets from the file below
  path: user_credential.yaml        # gitignored; e.g. {wandb: {api_key: ...}}
  environment_variables:
    WANDB_API_KEY: [wandb, api_key]
wandb:
  # The W&B logger below runs offline by default, so it needs no key and no
  # login. To push this run online: set loggers.wandb.offline=false here, then
  # enable this block (+ user_credential above) so the key is exported and
  # `wandb login` runs once per machine.
  enabled: false
  mode: online
  login: false
  api_key_env_var: WANDB_API_KEY

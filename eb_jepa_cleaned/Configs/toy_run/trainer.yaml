# @package trainer
# Toy trainer: one optimizer step. num_sanity_val_steps=0 + max_steps=1 mean a
# training run stops before end-of-epoch validation; trainer.validate still runs
# the full val loop.
max_steps: 1
num_sanity_val_steps: 0
accelerator: cpu
enable_checkpointing: false
enable_progress_bar: false
enable_model_summary: false

logging:
  log_wandb: false
  wandb_group:
  wandb_sweep:
  log_every: 10
  exp_suffix: tworooms
  save_every_n_epochs: 1
  tqdm_silent: false

meta:
  model_folder:
  load_model: true
  enable_plan_eval: false
  eval_every_itr: -1
  light_eval_freq: 50
  seed: 42

data:
  env_name: two_rooms
  batch_size: 128
  num_workers: 4
  pin_mem: false
  persistent_workers: false

training:
  use_amp: false
  dtype: float32

model:
  compile: false
  dobs: 2
  henc: 32
  hpre: 32
  dstc: 32
  nsteps: 8
  encoder_architecture: impala
  train_rollout: last
  encoder_skip_connections: true
  predictor_skip_connections: true
  regularizer:
    cov_coeff: 8
    std_coeff: 16
    sim_coeff_t: 12
    idm_coeff: 1
    first_t_only: false
    spatial_as_samples: false
    use_proj: false
    idm_after_proj: false
    sim_t_after_proj: false

optim:
  epochs: 20
  lr: 0.001
  grad_clip_enc: 2.0
  grad_clip_pred: 2.0
  weight_decay: 1.e-5

eval:
  plan_cfg_path: examples/ac_video_jepa/cfgs/planning_mppi.yaml
  eval_cfg_path: examples/ac_video_jepa/cfgs/eval.yaml
